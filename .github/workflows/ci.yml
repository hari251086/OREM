name: CI

on:
  push:
    branches: [main, HS-dev]
  pull_request:
    branches: [main, HS-dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gfortran
        run: sudo apt-get update && sudo apt-get install -y gfortran

      - name: Compile and run all test suites
        run: |
          chmod +x test_all.sh
          ./test_all.sh
